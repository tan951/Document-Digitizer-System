zero_shot_fields:
  - name: "ten_giam_doc"
    description: "tên giám đốc"
  - name: "so_hop_dong"
    description: "số hợp đồng"

router:
  templates:
    - template_id: "toa_an_hinh_su"
      document_detection:
        keywords: ["TÒA ÁN NHÂN DÂN", "BẢN ÁN", "Bị cáo"]
        regexes: ["BẢN ÁN", "HÌNH SỰ", "HS-ST", "HS-PT"]
        negative_keywords: ["QUYẾT ĐỊNH", "NGUYÊN ĐƠN", "BỊ ĐƠN", "BẢO HIỂM", "UBND", "BHXH"]
      # [FIX] Đã gỡ ngay_thang_nam
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban", "ten_bi_cao", "toi_danh", "dia_chi", "gia_tri_tai_san_chiem_doat"]

    - template_id: "toa_an_dan_su"
      document_detection:
        keywords: ["TÒA ÁN NHÂN DÂN", "QUYẾT ĐỊNH", "DÂN SỰ", "BẢN ÁN"]
        regexes: ["QUYẾT ĐỊNH", "DÂN SỰ", "QĐ-ST", "DS-ST", "DS-PT", "QĐ-PT"]
        negative_keywords: ["BLHS", "BẢO HIỂM", "UBND", "BHXH"]
      # [FIX] Đã gỡ ngay_thang_nam, người đại diện, giá trị tranh chấp (thường xuyên khuyết ở bản án phụ)
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban", "nguyen_don", "bi_don", "dia_chi"]

    - template_id: "bao_hiem_thong_bao"
      document_detection:
        keywords: ["BẢO HIỂM XÃ HỘI", "THÔNG BÁO"]
        regexes: ["BẢO HIỂM XÃ HỘI", "THÔNG BÁO", "TB-BHXH"]
        negative_keywords: ["TÒA ÁN", "BẢN ÁN", "UBND", "CÔNG VĂN", "QUYẾT ĐỊNH"]
      # [FIX] Tách riêng luồng Thông Báo: Đòi hỏi đầy đủ thông tin doanh nghiệp & liên hệ
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban", "ma_don_vi", "ten_don_vi", "so_tien", "thoi_han_dong", "so_dien_thoai", "dia_chi"]

    - template_id: "bao_hiem_quyet_dinh"
      document_detection:
        keywords: ["BẢO HIỂM XÃ HỘI", "QUYẾT ĐỊNH"]
        regexes: ["BẢO HIỂM XÃ HỘI", "QĐ-BHXH"]
        negative_keywords: ["TÒA ÁN", "BẢN ÁN", "UBND", "CÔNG VĂN", "THÔNG BÁO"]
      # [FIX] Tách riêng luồng Quyết định BHXH: Rút gọn tối đa các trường bắt buộc
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban", "ten_don_vi"]

    - template_id: "ngan_hang"
      document_detection:
        keywords: ["NGÂN HÀNG NHÀ NƯỚC", "THÔNG TƯ", "NHNN"]
        regexes: ["NGÂN HÀNG NHÀ NƯỚC", "THÔNG TƯ"]
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban"]
        
    - template_id: "ubnd"
      document_detection:
        keywords: ["ỦY BAN NHÂN DÂN", "UBND", "CÔNG VĂN"]
        regexes: ["ỦY BAN NHÂN DÂN", "UBND", "CÔNG VĂN"]
        negative_keywords: ["TÒA ÁN", "BẢN ÁN", "BẢO HIỂM", "BHXH"]
      # [FIX] Đã gỡ ngay_thang_nam và trich_yeu
      required_fields: ["so_quyet_dinh", "ky_hieu", "ten_co_quan_to_chuc", "ten_loai_van_ban", "kinh_gui"]

fields:
  so_van_ban_ngan_hang:
    category: "fixed"
    is_numeric: true
    label_regexes: ["Số:"]
    value_strategy: "same_line"
    value_regexes: ["Số:\\s*([0-9/]+/[A-Z-]+)"]
    correction: false
    validation:
      regex: "\\d"
    presence_check_regex: "(?i)(số|so|s[ôô6oo])\\s*[:\\.]"

  so_quyet_dinh:
    category: "fixed"
    is_numeric: true
    label_regexes: ["Số:"]
    value_strategy: "same_line"
    value_regexes: ["Số:\\s*([0-9/]+/[A-Z-]+)"]
    correction: false
    validation:
      regex: "\\d"
    presence_check_regex: "(?i)(số|so|s[ôô6oo])\\s*[:\\.]"

  ky_hieu:
    category: "fixed"
    is_numeric: true
    label_regexes: ["\\bKý\\s*hiệu\\b\\s*[:\\-]?\\s*", "\\bKy\\s*hieu\\b\\s*[:\\-]?\\s*"]
    value_strategy: "same_line"
    correction: false
    validation:
      min_length: 1
    presence_check_regex: "(?i)\\b(ký hiệu|ky hieu)\\b"

  ngay_thang_nam:
    category: "fixed"
    is_numeric: true
    label_regexes: ["\\bNgày\\s*tháng\\s*năm\\b\\s*[:\\-]?\\s*"]
    value_strategy: "same_line"
    value_regexes: ["\\d{1,2}\\s*[-\\/\\.]\\s*\\d{1,2}\\s*[-\\/\\.]\\s*\\d{2,4}", "\\d{4}\\s*[-\\/\\.]\\s*\\d{1,2}\\s*[-\\/\\.]\\s*\\d{1,2}"]
    normalizer: "date_dmy_to_iso"
    correction: false
    validation:
      allow_placeholders: ["X", "."]
      regex: "^\\d{4}-\\d{2}-\\d{2}$"
      fallback_year_regex: "\\b(19|20)\\d{2}\\b"
    presence_check_regex: "(?i)\\b(ngày|tháng|năm|\\d{1,2}[\\/\\-]\\d{1,2}[\\/\\-]\\d{2,4})\\b"

  ten_co_quan_to_chuc:
    category: "fixed"
    is_numeric: false
    label_regexes: ["^Cơ\\s*quan\\s*tổ\\s*chức\\s*[:\\-]?\\s*"]
    value_strategy: "same_line"
    normalizer: "name_strip"
    correction: false
    gliner_labels: ["cơ quan ban hành", "tên cơ quan", "tổ chức ban hành"]
    gliner_threshold: 0.42
    validation:
      min_words: 1
    presence_check_regex: "(?i)(tòa án|ủy ban|bhxh|bảo hiểm|công ty|ngân hàng)"
    correction_safe_rules:
      min_similarity: 0.85

  ten_loai_van_ban:
    category: "fixed"
    is_numeric: false
    label_regexes: []
    value_strategy: "pattern_match"
    correction: true
    gliner_labels: ["loại văn bản", "tên loại văn bản"]
    gliner_threshold: 0.40
    validation:
      min_words: 1
    presence_check_regex: ""
    # [FIX]: Cấm AI tự ý can thiệp phá hỏng khoảng trắng và cấu trúc số hiệu văn bản
    correction_safe_rules:
      skip_model: true

  ten_bi_cao:
    category: "dynamic"
    is_numeric: false
    label_regexes: ["Bị cáo"]
    value_strategy: "same_line"
    value_regexes: ["Bị cáo[:\\s]*([A-ZÀ-Ỹa-zà-ỹ\\s]+?)(?=,|\\s*sinh|$)"]
    correction: true
    gliner_labels: ["tên bị cáo", "bị cáo", "defendant name"]
    gliner_threshold: 0.45
    validation:
      min_words: 2
    correction_safe_rules:
      skip_model: true  # Tránh mô hình seq2seq phá hủy cấu trúc tên riêng cưỡng bức

  toi_danh:
    category: "dynamic"
    is_numeric: false
    label_regexes: ["Tội danh", "Về tội", "Tội"]
    value_strategy: "same_line"
