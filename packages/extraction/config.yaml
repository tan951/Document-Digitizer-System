io:
  input_dir: "./data/input"
  output_dir: "./data/output"

engine_settings:
  max_workers_ratio: 1.0  # os.cpu_count() // 2
  max_workers_cap: 8
  routing_target_score: 7.0   # [FIX-F] ngưỡng tính conf routing, trước đây hardcode
  caches:
    ocr_capacity: 10000
    route_capacity: 2000
    correction_capacity: 10000

models:
  gliner:
    local_path: "local_models/gliner_multi-v2.1"
    fallback_hf_id: "urchade/gliner_multi-v2.1"
    default_threshold: 0.42
    inference_threshold: 0.25  # [FIX-G] ngưỡng global cho gliner.inference(), trước đây hardcode
    chunk_size: 250
  spacy:
    models_priority: ["vi_core_news_lg", "vi_core_news_sm", "xx_ent_wiki_sm"]
    disabled_pipes: ["tok2vec", "parser", "tagger", "attribute_ruler", "lemmatizer", "senter", "sentencizer"]
  symspell:
    dict_path: "dictionary/Viet74K.txt"
    pickle_path: "dictionary/symspell_cache.pkl"
    max_dictionary_edit_distance: 2
    prefix_length: 7
  correction:
    local_path: "local_models/vietnamese-correction-v2"
    hf_id: "bmd1905/vietnamese-correction-v2"
    batch_size: 32
    max_length: 64

extraction:
  value_window_lines: 2
  label_fuzzy_threshold: 0.85
  extra_org_prefixes: []
  min_blocks_threshold: 6
  header_line_limit: 15          # [FIX-I] giới hạn dòng vùng header để nhận diện fixed fields
  so_line_boundary: 10           # [FIX-I] ngưỡng dòng xác định "Số:" nằm trong header
  date_context_window: 5         # [FIX-J] ±n dòng lân cận khi kiểm tra near_so cho ngày
  cong_hoa_search_window: 15     # [FIX-K] số dòng tìm cơ quan sau dòng CỘNG HÒA
  spacy_max_chars: 500           # [FIX-L] số ký tự tối đa truyền vào spaCy NER
  interpolated_line_confidence: 0.8  # [FIX] confidence cho dòng được nội suy bbox

nlp_constants:
  proper_noun_allowlist: ["minh", "anh", "bình", "dũng", "hòa", "hà", "hùng", "khoa", "long", "mai", "nam", "nga", "nhung", "phong", "phúc", "quân", "thắng", "thu", "thủy", "tiến", "toàn", "trung", "tùng", "tuyến", "út", "xuân", "blhs", "bltths", "bhxh", "bhyt", "tp", "hcm", "tphcm"]
  legal_document_titles_whitelist: ["QUYẾT ĐỊNH", "THÔNG BÁO", "QUYẾT NGHỊ", "NGHỊ QUYẾT", "THÔNG TƯ", "CÔNG VĂN", "BIÊN BẢN", "BẢN ÁN", "LỆNH", "THÔNG CÁO", "CHỈ THỊ", "NGHỊ ĐỊNH", "THÔNG TƯ LIÊN TỊCH", "HỢP ĐỒNG", "GIẤY CHỨNG NHẬN", "GIẤY PHÉP", "GIẤY ỦY QUYỀN", "THỎA THUẬN", "BIÊN BẢN GHI NHỚ"]
  org_unit_field_names: ["ten_co_quan_to_chuc", "ten_don_vi", "kinh_gui", "ten_loai_van_ban", "ma_don_vi", "nguoi_ky"]
  legal_abbreviation_protected: ["TNHH", "CP", "MTV", "BHXH", "UBND", "HĐND", "DNTN", "CTCP"]

  # [FIX-P1-C] Từ khóa noise trên header — trước đây hardcode trong SKIP_RE
  header_noise_keywords: ["CỘNG HÒA", "ĐỘC LẬP", "TỰ DO", "HẠNH PHÚC"]
  # [FIX-P1-C] Từ khóa xác định dòng CỘNG HÒA — trước đây hardcode trong regex split
  cong_hoa_keywords: ["CỘNG HÒA", "CONG HOA"]
  # [FIX-P1-D] Từ khóa tổ chức mạnh trong header — trước đây hardcode trong strong_header_re
  strong_org_keywords: ["TÒA ÁN", "ỦY BAN NHÂN DÂN", "UBND", "BHXH", "BẢO HIỂM XÃ HỘI", "NGÂN HÀNG NHÀ NƯỚC"]

  # [FIX-P1-A] Bảng chuyển đổi số chữ → số — trước đây hardcode inline mỗi lần gọi hàm
  word_to_num:
    "một": 1
    "hai": 2
    "ba": 3
    "bốn": 4
    "năm": 5
    "sáu": 6
    "bảy": 7
    "tám": 8
    "chín": 9
    "mười": 10
    "mười một": 11
    "mười hai": 12
    "mười ba": 13
    "mười bốn": 14
    "mười lăm": 15
    "mười sáu": 16
    "mười bảy": 17
    "mười tám": 18
    "mười chín": 19
    "hai mươi": 20
    "hai mươi mốt": 21
    "hai mươi hai": 22
    "hai mươi ba": 23
    "hai mươi bốn": 24
    "hai mươi lăm": 25
    "hai mươi sáu": 26
    "hai mươi bảy": 27
    "hai mươi tám": 28
    "hai mươi chín": 29
    "ba mươi": 30
    "ba mươi mốt": 31
  
  # Quy tắc Regex dùng chung cho toàn hệ thống pipeline
  patterns:
    section_break: "^\\s*(Điều\\s+\\d+|Nội dung|Người đại diện|Tài sản|Kính gửi|Căn cứ|Theo đề nghị)\\b"
    so_prefix: "(?:Số|S[Ôô6Oo]|SO)\\s*[:\\.]?\\s*"
    so_van_ban_full: "(?:Số|S[Ôô6Oo]|SO)\\s*[:\\.]?\\s*([\\d]+(?:/[\\d]+)?/[A-ZĐa-zđ][A-ZĐa-zđ0-9\\-]+)"
    so_van_ban_simple: "(?:Số|S[Ôô6Oo]|SO)\\s*[:\\.]?\\s*(\\d+[\\/]?)\\s*$"
    van_ban_title: "^(QUYẾT ĐỊNH|THÔNG BÁO|QUYẾT NGHỊ|NGHỊ QUYẾT|THÔNG TƯ|CÔNG VĂN|BIÊN BẢN|BẢN ÁN|LỆNH|THÔNG CÁO|CHỈ THỊ|NGHỊ ĐỊNH|THÔNG TƯ LIÊN TỊCH|HỢP ĐỒNG|GIẤY CHỨNG NHẬN|GIẤY PHÉP|GIẤY ỦY QUYỀN|QUYẾT NGHỊ|THỎA THUẬN|BIÊN BẢN GHI NHỚ|ĐÌNH CHỈ)(?:[\\s\\w\\/\\-\\(\\),\\.]*$|(?=\\s*(?:Số|S[Ôô6Oo]|SO)\\s*[:\\.\\d]))"
    co_quan_base_prefixes: "TÒA ÁN|CƠ QUAN|ỦY BAN|BAN|TRUNG TÂM|VĂN PHÒNG|SỞ|PHÒNG|CỤC|BỘ|VIỆN|BHXH|BẢO HIỂM XÃ HỘI|BẢO HIỂM Y TẾ|UBND|HĐND|CHI CỤC|TỔNG CỤC|VỤ|BAN QUẢN LÝ|CÔNG TY|DOANH NGHIỆP|HỢP TÁC XÃ|QUỸ|NGÂN HÀNG|NGÂN HÀN|TRƯỜNG|BỆNH VIỆN|TRẠM|ĐỘI|LIÊN ĐOÀN|HỘI|ĐOÀN|TỔNG LIÊN ĐOÀN|HIỆP HỘI|LIÊN HIỆP|CHI NHÁNH|TRUNG ƯƠNG|ĐỊA PHƯƠNG|NHÂN DÂN|CHÍNH PHỦ|THỦ TƯỚNG|BỘ TRƯỞNG|NGÂN HÀNG NHÀ NƯỚC|NGÂN HÀN NHÀ NƯỚC|NGÂN HÀNG|NGÂN HÀN|BHXH|BẢO HIỂM XÃ HỘI|TÒA ÁN"
    date_signature: "(?:hà\\s+nội|tp\\.?\\s*hồ\\s*chí\\s*minh|tp\\.?\\s*hcm|đà\\s+nẵng|huế|thành\\s+phố\\s+[\\w\\s]+|[\\wÀ-ỹ]{2,20})\\s*,\\s*ngày\\s+"
    date_deadline_noise: "\\b(trước\\s+ngày|đến\\s+ngày|hạn\\s+nộp|thời\\s+hạn|chậm\\s+đóng|báo\\s+cáo\\s+trước|nộp\\s+trước|hết\\s+hạn)\\b"
    date_body_noise: "\\b(xét\\s+thấy|căn\\s+cứ\\s+điều|đương\\s+sự|mở\\s+phiên|theo\\s+đề\\s+nghị)\\b"
    so_line: "(?i)(?:^|\\b)(?:Số|S[Ôô6Oo]|SO)\\s*[:\\.]"

  whitelist_patterns:
    - name: "date_slash"
      regex: "\\b\\d{1,2}[\\/\\-\\.]\\d{1,2}[\\/\\-\\.]\\d{2,4}\\b"
    - name: "date_text"
      regex: "ngày\\s*\\d{1,2}\\s*tháng\\s*\\d{1,2}\\s*năm\\s*\\d{4}"
    - name: "so_bhxh"
      regex: "\\b\\d{10}\\b"
    - name: "so_van_ban"
      regex: "\\b\\d+\\/(?:\\d+\\/)?[A-ZĐ][A-ZĐ0-9\\-]+\\b"
    - name: "ma_don_vi"
      regex: "\\b(?=.*\\d)[A-Z0-9]{6,10}\\b"
    - name: "luat_reference"
      regex: "\\b(?:Điều|Khoản|Điểm)\\s+\\d+[a-z]?\\b"
    - name: "so_dien_thoai"
      regex: "\\b0\\d{9,10}\\b"

