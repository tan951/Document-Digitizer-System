io:
  input_dir: "./data/input"
  output_dir: "./data/output"

extraction:
  value_window_lines: 2
  label_fuzzy_threshold: 0.85

router:
  templates:
    - template_id: "toa_an"
      document_detection:
        keywords:
          - "Khối Tòa án"
          - "Tòa án nhân dân"
        regexes:
          - "Khối\\s*Tòa\\s*án"
          - "Tòa\\s*án"
      required_fields:
        - "so_quyet_dinh"
        - "ky_hieu"
        - "ngay_thang_nam"
        - "ten_co_quan_to_chuc"
        - "ten_bi_cao"
        - "toi_danh"

    - template_id: "bao_hiem"
      document_detection:
        keywords:
          - "Khối Bảo hiểm"
          - "BHXH"
        regexes:
          - "Khối\\s*Bảo\\s*hiểm"
          - "BHXH"
      required_fields:
        - "so_bhxh"
        - "ky_hieu"
        - "ngay_thang_nam"
        - "ten_co_quan_to_chuc"

fields:
  so_quyet_dinh:
    label_regexes: ["Số:"]
    value_strategy: "same_line"
    value_regexes: ["Số:\\s*([0-9/]+/[A-Z-]+)"]

  ky_hieu:
    label_regexes:
      - "\\bKý\\s*hiệu\\b\\s*[:\\-]?\\s*"
      - "\\bKy\\s*hieu\\b\\s*[:\\-]?\\s*"
    value_strategy: "same_line"

  ngay_thang_nam:
    label_regexes:
      - "\\bNgày\\s*tháng\\s*năm\\b\\s*[:\\-]?\\s*"
      - "\\bNgay\\s*thang\\s*nam\\b\\s*[:\\-]?\\s*"
    value_strategy: "same_line"
    value_regexes:
      - "\\d{1,2}\\s*[-\\/\\.]\\s*\\d{1,2}\\s*[-\\/\\.]\\s*\\d{2,4}"
      - "\\d{4}\\s*[-\\/\\.]\\s*\\d{1,2}\\s*[-\\/\\.]\\s*\\d{1,2}"
    normalizer: "date_dmy_to_iso"

  ten_co_quan_to_chuc:
    label_regexes:
      - "^Cơ\\s*quan\\s*tổ\\s*chức\\s*[:\\-]?\\s*"
    value_strategy: "same_line"
    normalizer: "name_strip"

  ten_bi_cao:
    label_regexes: ["Bị cáo"]
    value_strategy: "same_line"
    value_regexes: ["Bị cáo[:\\s]*([A-ZÀ-Ỹ\\s]+?)(?=,|\\s*sinh|$)"]

  toi_danh:
    label_regexes: ["Tội danh"]
    value_strategy: "same_line"
    value_regexes: ["Tội danh[:\\s]*(.+?)(?=\\(|theo|$)"]

  so_bhxh:
    label_regexes: ["Số sổ BHXH"]
    value_strategy: "same_line"
    value_regexes: ["Số sổ BHXH[:\\s]*(\\d{9,14})"]

auto_correction:
  enabled: true
  ocr_confusions:
    "O": "0"
    "o": "0"
    "l": "1"
    "I": "1"
  date:
    enabled: true
  number:
    enabled: true